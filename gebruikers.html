<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Gebruikersbeheer – MHC Rosmalen</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").then(()=>navigator.serviceWorker.ready).then(reg=>reg.update());}</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0E2A5A; --gold: #F5A800; --gold-dark: #C98A00; --white: #fff; --gray-100: #F4F5F7; --gray-200: #E5E7EB; --gray-300: #D1D5DB; --gray-500: #6B7280; --danger: #DC2626; --success: #16A34A; --radius: 12px; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--navy); padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header img { width: 44px; height: 44px; object-fit: contain; }
    header h1 { color: var(--white); font-size: 1.1rem; font-weight: 600; line-height: 1.2; }
    header span { color: var(--gold); display: block; font-size: .75rem; font-weight: 400; letter-spacing: .04em; text-transform: uppercase; }
    .header-actions { margin-left: auto; display: flex; gap: .75rem; align-items: center; }
    .header-user { font-size: .8rem; color: rgba(255,255,255,.6); }
    .btn-header { font-size: .8rem; color: rgba(255,255,255,.7); background: none; border: 1px solid rgba(255,255,255,.2); padding: 5px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    .btn-header:hover { color: var(--white); border-color: rgba(255,255,255,.5); }
    main { max-width: 800px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h2 { font-size: 1.3rem; font-weight: 600; }
    .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-300); padding: 1.25rem 1.5rem; margin-bottom: .75rem; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { text-align: left; padding: 8px 12px; background: var(--gray-100); font-weight: 500; color: var(--gray-500); border-bottom: 1px solid var(--gray-200); font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
    td { padding: 12px 12px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-100); }
    .rol-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .rol-superadmin { background: #FDE8FF; color: #7E22CE; }
    .rol-technische_coordinator { background: #DBEAFE; color: #1E40AF; }
    .rol-lijncoordinator { background: #D1FAE5; color: #065F46; }
    .rol-bestuurslid { background: #F3F4F6; color: #374151; }
    .btn { padding: 8px 16px; font-family: inherit; font-size: .875rem; font-weight: 500; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: background .15s; }
    .btn-primary { background: var(--navy); color: var(--white); }
    .btn-primary:hover { background: #0a1f45; }
    .btn-secondary { background: var(--white); color: var(--navy); border-color: var(--gray-300); }
    .btn-secondary:hover { background: var(--gray-100); }
    .btn-danger { background: var(--white); color: var(--danger); border-color: #FECACA; }
    .btn-danger:hover { background: #FEF2F2; }
    .btn-sm { padding: 5px 10px; font-size: .8125rem; }
    .actions { display: flex; gap: .5rem; }
    .empty-state { text-align: center; padding: 2rem; color: var(--gray-500); font-size: .9rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: var(--radius); width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .modal-header h3 { font-size: 1rem; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--gray-500); padding: 4px 8px; border-radius: 4px; }
    .modal-close:hover { background: var(--gray-100); }
    .modal-body { padding: 1.25rem 1.5rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); display: flex; gap: .75rem; justify-content: flex-end; }
    .form-row { margin-bottom: 1rem; }
    .form-row label { display: block; font-size: .8125rem; font-weight: 500; color: var(--gray-500); margin-bottom: .4rem; }
    .form-row input, .form-row select { width: 100%; padding: 9px 12px; font-family: inherit; font-size: 16px; border: 1px solid var(--gray-300); border-radius: 8px; outline: none; color: var(--navy); background: var(--white); }
    .form-row input:focus, .form-row select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,168,0,.15); }
    .error { font-size: .8125rem; color: var(--danger); margin-top: .4rem; display: none; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy); color: var(--white); padding: .75rem 1.25rem; border-radius: 8px; font-size: .875rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; }
    .toast.show { opacity: 1; }
    @media(max-width:600px) {
      header { padding: .875rem 1rem; }
      header img { width: 34px; height: 34px; }
      main { padding: 1.25rem .75rem 3rem; }
      .header-user { display: none; }
      .modal { max-width: 100%; border-radius: 0; }
      .modal-overlay { padding: 0; align-items: flex-end; }
      .tabel-desktop { display: none; }
      .kaarten-mobiel { display: flex; flex-direction: column; gap: .75rem; }
    }
    @media(min-width:601px) { .kaarten-mobiel { display: none; } }
    .gebruiker-kaart { background: var(--white); border-radius: 10px; border: 1px solid var(--gray-300); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .gebruiker-kaart-info { flex: 1; min-width: 0; }
    .gebruiker-kaart-naam { font-weight: 600; font-size: .9375rem; margin-bottom: .2rem; }
    .gebruiker-kaart-email { font-size: .8rem; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gebruiker-kaart-rol { margin-top: .4rem; }
  </style>
</head>
<body>
  <header>
    <img src="logo_mhcrosmalen.gif" alt="MHC Rosmalen">
    <div>
      <h1>MHC Rosmalen</h1>
      <span>Gebruikersbeheer</span>
    </div>
    <div class="header-actions">
      <span class="header-user" id="header-user"></span>
      <a href="dashboard.html" class="btn-header">← Dashboard</a>
      <button class="btn-header" onclick="uitloggen()">Uitloggen</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2>Gebruikers</h2>
      <button class="btn btn-primary" onclick="openNieuw()">+ Gebruiker toevoegen</button>
    </div>
    <div class="card">
      <div id="tabel-wrap"><div class="empty-state">Laden...</div></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) sluitModal()">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titel">Gebruiker toevoegen</h3>
        <button class="modal-close" onclick="sluitModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>Naam</label>
          <input type="text" id="m-naam" placeholder="Voor- en achternaam">
        </div>
        <div class="form-row">
          <label>E-mailadres</label>
          <input type="email" id="m-email" placeholder="naam@gmail.com">
        </div>
        <div class="form-row">
          <label>Rol</label>
          <select id="m-rol">
            <option value="superadmin">Superadmin</option>
            <option value="technische_coordinator">Technische coördinator</option>
            <option value="lijncoordinator">Lijncoördinator</option>
            <option value="bestuurslid">Bestuurslid</option>
          </select>
        </div>
        <div class="error" id="m-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="verwijder-btn" onclick="verwijderGebruiker()" style="display:none">Verwijderen</button>
        <button class="btn btn-secondary" onclick="sluitModal()">Annuleren</button>
        <button class="btn btn-primary" onclick="slaOp()">Opslaan</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://kgziynyxcktoiqedquwl.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtneml5bnl4Y2t0b2lxZWRxdXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDI0NDgsImV4cCI6MjA5NzA3ODQ0OH0.nIbuFOjNsAcCRY0wvb5EoD4MfN8ga221YXuomrZOj9E';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const rolLabels = { superadmin:'Superadmin', technische_coordinator:'Technische coördinator', lijncoordinator:'Lijncoördinator', bestuurslid:'Bestuurslid' };

    // Auth check
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; }
    const { data: ikzelf } = await sb.from('gebruikers').select('*').eq('email', session.user.email).single();
    if (!ikzelf || ikzelf.rol !== 'superadmin') { window.location.href = 'dashboard.html'; }
    document.getElementById('header-user').textContent = ikzelf.naam;

    let gebruikersLijst = [];
    let bewerkId = null;

    async function laadGebruikers() {
      const { data, error } = await sb.from('gebruikers').select('*').order('naam');
      if (error) { console.error(error); return; }
      gebruikersLijst = data;
      renderTabel(data);
    }

    function renderTabel(gebruikers) {
      const wrap = document.getElementById('tabel-wrap');
      if (!gebruikers.length) {
        wrap.innerHTML = '<div class="empty-state">Geen gebruikers gevonden.</div>';
        return;
      }
      const rows = gebruikers.map(g => `
        <tr>
          <td><strong>${g.naam||'—'}</strong></td>
          <td>${g.email||'—'}</td>
          <td><span class="rol-badge rol-${g.rol||''}">${rolLabels[g.rol]||g.rol}</span></td>
          <td><div class="actions"><button class="btn btn-secondary btn-sm" onclick="openBewerk('${g.id}')">Wijzigen</button></div></td>
        </tr>
      `).join('');
      const kaarten = gebruikers.map(g => `
        <div class="gebruiker-kaart">
          <div class="gebruiker-kaart-info">
            <div class="gebruiker-kaart-naam">${g.naam||'—'}</div>
            <div class="gebruiker-kaart-email">${g.email||'—'}</div>
            <div class="gebruiker-kaart-rol"><span class="rol-badge rol-${g.rol||''}">${rolLabels[g.rol]||g.rol}</span></div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="openBewerk('${g.id}')">Wijzigen</button>
        </div>
      `).join('');
      wrap.innerHTML = `
        <div class="tabel-desktop">
          <table>
            <thead><tr><th>Naam</th><th>E-mail</th><th>Rol</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="kaarten-mobiel">${kaarten}</div>
      `;
    }

    window.openNieuw = function() {
      bewerkId = null;
      document.getElementById('modal-titel').textContent = 'Gebruiker toevoegen';
      document.getElementById('m-naam').value = '';
      document.getElementById('m-email').value = '';
      document.getElementById('m-rol').value = 'technische_coordinator';
      document.getElementById('m-error').style.display = 'none';
      document.getElementById('verwijder-btn').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('open');
    };

    window.openBewerk = function(id) {
      const g = gebruikersLijst.find(x => x.id === id);
      if (!g) return;
      bewerkId = id;
      document.getElementById('modal-titel').textContent = 'Gebruiker wijzigen';
      document.getElementById('m-naam').value = g.naam || '';
      document.getElementById('m-email').value = g.email || '';
      document.getElementById('m-rol').value = g.rol || 'bestuurslid';
      document.getElementById('m-error').style.display = 'none';
      document.getElementById('verwijder-btn').style.display = g.email === ikzelf.email ? 'none' : 'inline-block';
      document.getElementById('modal-overlay').classList.add('open');
    };

    window.sluitModal = function() {
      document.getElementById('modal-overlay').classList.remove('open');
      bewerkId = null;
    };

    window.slaOp = async function() {
      const naam = document.getElementById('m-naam').value.trim();
      const email = document.getElementById('m-email').value.trim().toLowerCase();
      const rol = document.getElementById('m-rol').value;
      const errEl = document.getElementById('m-error');
      errEl.style.display = 'none';
      if (!naam || !email) { errEl.textContent = 'Vul naam en e-mail in.'; errEl.style.display = 'block'; return; }

      if (bewerkId) {
        const { error } = await sb.from('gebruikers').update({ naam, email, rol }).eq('id', bewerkId);
        if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
        showToast('Gebruiker bijgewerkt ✓');
      } else {
        const { error } = await sb.from('gebruikers').insert({ naam, email, rol });
        if (error) { errEl.textContent = error.code === '23505' ? 'Dit e-mailadres bestaat al.' : error.message; errEl.style.display = 'block'; return; }
        showToast('Gebruiker toegevoegd ✓');
      }
      sluitModal();
      await laadGebruikers();
    };

    window.verwijderGebruiker = async function() {
      if (!bewerkId) return;
      const g = gebruikersLijst.find(x => x.id === bewerkId);
      if (!confirm(`Weet je zeker dat je "${g?.naam}" wilt verwijderen?`)) return;
      const { error } = await sb.from('gebruikers').delete().eq('id', bewerkId);
      if (error) { alert('Fout: ' + error.message); return; }
      sluitModal();
      showToast('Gebruiker verwijderd');
      await laadGebruikers();
    };

    window.uitloggen = async function() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    laadGebruikers();
  </script>
</body>
</html>
